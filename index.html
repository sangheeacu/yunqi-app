function getKeQi(si){const i=SIX_QI.indexOf(si);return SIX_QI.map((_,j)=>SIX_QI[(i-2+j+6)%6]);}
function getKeYun(e){const r=[e];let c=e;for(let i=1;i<5;i++){c=YUN_GEN[c];r.push(c);}return r;}
function judgeRisk(ke,zh){
  if((ke==="火"||ke==="相火")&&(zh==="火"||zh==="相火"))return"雙火";
  if(ke==="土"&&zh==="土")return"雙土";
  const k={木:"土",火:"金",土:"水",金:"木",水:"火",相火:"金"};
  if(k[ke]===zh||k[zh]===ke)return"逆";
  return"順";
}
function calcYear(yr){
  const idx=((yr-1984)%60+60)%60;
  const jz=JIAZI[idx],stem=STEMS[idx%10],branch=BRANCHES[idx%12];
  const [dayunName,dayunElem]=STEM_DAYUN[stem];
  const{si,zai}=BRANCH_QI[branch];
  const keQi=getKeQi(si),keYun=getKeYun(dayunElem);
  const special=SPECIAL[jz+yr]||SPECIAL[jz]||"—";
  const siElem=SIX_QI_ELEM[si];
  const k={木:"土",火:"金",土:"水",金:"木",水:"火",相火:"金"};
  const g={木:"火",火:"土",土:"金",金:"水",水:"木",相火:"土"};
  const yunQiRel=siElem===dayunElem?"順化":k[dayunElem]===siElem?"天刑":g[dayunElem]===siElem?"小逆":"不和";
  const segs=SEG_LABELS.map((name,i)=>{
    const yi=[0,0,1,1,2,2,3,3,4,4][i],qi=[0,1,1,2,2,3,3,4,4,5][i];
    const zYun=FIVE_YUN[yi],kYun=keYun[yi],zQi=SIX_QI[qi],kQiName=keQi[qi];
    const kQiEl=SIX_QI_ELEM[kQiName],zQiEl=SIX_QI_ELEM[zQi];
    return{name,zYun,kYun,zQi,kQiName,kQiEl,zQiEl,risk:judgeRisk(kQiEl,zQiEl)};
  });
  return{jz,stem,branch,dayunName,dayunElem,si,zai,keQi,keYun,special,yunQiRel,segs,siElem};
}

function parseSegDate(dateStr,yr){
  const[startStr]=dateStr.split("~");
  const[m,d]=startStr.split(".").map(Number);
  return new Date(yr,m-1,d);
}
function getUpcomingRiskSegs(segs,hemi,yr){
  const now=new Date();
  const upcoming=[];
  const dates=hemi==="S"?DATES_S:DATES_N;
  segs.forEach((s,i)=>{
    if(s.risk==="雙火"||s.risk==="雙土"||s.risk==="逆"){
      const startDate=parseSegDate(dates[i],yr);
      const alertStart=new Date(startDate);alertStart.setDate(alertStart.getDate()-30);
      const alertEnd=new Date(startDate);alertEnd.setDate(alertEnd.getDate()+14);
      if(now>=alertStart&&now<=alertEnd){
        const daysUntil=Math.ceil((startDate-now)/(1000*60*60*24));
        upcoming.push({...s,segIdx:i,startDate,daysUntil,dateStr:dates[i]});
      }
    }
  });
  return upcoming;
}

          <button onClick={()=>setAcctSection("main")} style={{width:"100%",padding:"9px 0",borderRadius:6,border:"1px solid #ddd",cursor:"pointer",background:C.white,color:C.gray,fontSize:12}}>Keep Subscription</button>
        </div>
      ):(
        <div>
          <div style={{background:C.white,borderRadius:8,padding:14,marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:42,height:42,borderRadius:"50%",background:C.blue,display:"flex",alignItems:"center",justifyContent:"center",color:C.white,fontWeight:"bold",fontSize:16}}>{(user.name&&user.name[0].toUpperCase())||"U"}</div>
                <div>
                  <div style={{fontWeight:"bold",color:C.ink,fontSize:13}}>{user.name}</div>
                  <div style={{color:C.gray,fontSize:11}}>{user.email}</div>
                  {user.dob&&<div style={{color:C.gray,fontSize:10}}>DOB: {user.dob}</div>}
                  {user.prefLang&&<div style={{color:C.gray,fontSize:10}}>Language: {(LANGUAGES.find(l=>l.v===user.prefLang)||{}).label}</div>}
                </div>
              </div>
              <div style={{background:isPaid?C.gold:C.blue,color:C.white,borderRadius:6,padding:"3px 9px",fontSize:10,fontWeight:"bold"}}>{isPaid?"💎 "+(userPlanType==="annual"?"Annual":"Monthly"):"Free"}</div>
            </div>
            {userConditions.length>0&&(
              <div style={{fontSize:11,color:C.gray,marginBottom:8,background:C.lightGray,borderRadius:6,padding:"6px 10px"}}>
                <span style={{fontWeight:"bold",color:C.ink}}>Health conditions: </span>{userConditions.join(", ")}
                <span style={{color:C.blue,cursor:"pointer",marginLeft:6}} onClick={()=>setOnboardStep(1)}>(update)</span>
              </div>
            )}
            <button onClick={()=>{setEditName(user.name);setEditEmail(user.email);setAcctSection("editProfile");}} style={{width:"100%",padding:"7px 0",borderRadius:6,border:"1px solid #ddd",cursor:"pointer",background:"#FAFAFA",color:C.ink,fontSize:12,marginBottom:6}}>✏️ Edit Profile</button>
            <button onClick={()=>setAcctSection("editPw")} style={{width:"100%",padding:"7px 0",borderRadius:6,border:"1px solid #ddd",cursor:"pointer",background:"#FAFAFA",color:C.ink,fontSize:12}}>🔑 Change Password</button>
          </div>
          <div style={{background:C.white,borderRadius:8,padding:14,marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
            <div style={{fontWeight:"bold",color:C.ink,fontSize:12,marginBottom:8}}>Subscription</div>
            {isPaid?(
              <div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <span style={{fontSize:12,color:"#444"}}>Plan</span>
                  <span style={{fontWeight:"bold",color:C.gold,fontSize:12}}>{userPlanType==="annual"?"Annual — $50/yr":"Monthly — $8/mo"}</span>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                  <span style={{fontSize:12,color:"#444"}}>Status</span>
                  <span style={{fontSize:12,color:C.green,fontWeight:"bold"}}>✅ Active</span>
                </div>
                <button onClick={()=>setTab("qa")} style={{width:"100%",padding:"8px 0",borderRadius:6,border:"none",cursor:"pointer",background:C.gold,color:C.white,fontWeight:"bold",fontSize:12,marginBottom:6}}>Go to Q&A →</button>
                <button onClick={()=>setAcctSection("cancelConfirm")} style={{width:"100%",padding:"7px 0",borderRadius:6,border:"1px solid #ddd",cursor:"pointer",background:C.white,color:"#999",fontSize:11}}>Cancel Subscription</button>
              </div>
            ):(
              <div>
                <div style={{fontSize:12,color:C.gray,marginBottom:10}}>Free plan. Upgrade for Q&A + 30-day risk alerts.</div>
                <button onClick={()=>setTab("subscribe")} style={{width:"100%",padding:"8px 0",borderRadius:6,border:"none",cursor:"pointer",background:C.gold,color:C.white,fontWeight:"bold",fontSize:12}}>Upgrade to Pro →</button>
              </div>
            )}
          </div>
          <button onClick={handleSignOut} style={{width:"100%",padding:"8px 0",borderRadius:6,border:"1px solid #ddd",cursor:"pointer",background:C.white,color:C.gray,fontSize:12}}>Sign Out</button>
        </div>
      )}
    </div>
  );

  return(
    <div style={{maxWidth:720,margin:"0 auto",padding:isMobile?"0":"12px",fontFamily:"'Apple SD Gothic Neo','Segoe UI',sans-serif",background:C.bgPage,minHeight:"100vh"}}>
      {onboardModal}
      {riskDetailModal}
      {hdr}
      <div style={{padding:isMobile?"0 8px 8px":"0"}}>
        {riskBanners}
        {tab==="features"&&featuresTab}
        {tab==="analyzer"&&analyzerTab}
        {tab==="subscribe"&&subscribeTab}
        {tab==="qa"&&qaTab}
        {tab==="account"&&accountTab}
      </div>
    </div>
  );
}

// ── 헬퍼 컴포넌트 ─────────────────────────────────────────────
function Section({title,bg,tc,pre,children}){
  return(
    <div style={{marginBottom:14}}>
      <div style={{fontWeight:"bold",color:"#1C2D58",fontSize:12,marginBottom:6}}>{title}</div>
      <div style={{color:tc||"#444",fontSize:12,lineHeight:1.7,background:bg||"#F5F5F5",borderRadius:8,padding:"10px 12px",whiteSpace:pre?"pre-line":"normal"}}>{children}</div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
