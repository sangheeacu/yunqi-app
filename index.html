// seq: (1-2+0+6)%6=5=TaiYang, (1-2+1+6)%6=0=JueYin, (1-2+2+6)%6=1=ShaoYin(ST)
// (1-2+3+6)%6=2=TaiYin, (1-2+4+6)%6=3=ShaoYang, (1-2+5+6)%6=4=YangMing
// = ColdWater, WindWood, EmperorFire, DampEarth, MinisterFire, DrynessM ✓
function getKeQi(si) {
  var idx = KQ_ORDER.indexOf(si);
  var result = [];
  for (var i = 0; i < 6; i++) {
    result.push(KQ_ORDER[(idx - 2 + i + 6) % 6]);
  }
  return result;
}

  for (var i = 1; i < 5; i++) { cur = YUN_GEN[cur]; els.push(cur); }
  // Labels with Tai/Shao
  var ch = {"\u6728":"\u89d2","\u706b":"\u5fb5","\u571f":"\u5bae","\u91d1":"\u5546","\u6c34":"\u7fbd"};
  var labels = [];
  var isTai = taiGuo;
  var c2 = dyEl;
  for (var j = 0; j < 5; j++) {
    labels.push((isTai ? "\u592a" : "\u5c11") + ch[c2]);
    c2 = YUN_GEN[c2]; isTai = !isTai;
  }
  return {els: els, labels: labels};
}

  var g = {"\u6728":"\u706b","\u706b":"\u571f","\u571f":"\u91d1","\u91d1":"\u6c34","\u6c34":"\u6728"};
  if (dyEl === siEl) return "\u5929\u7b26 Tian Fu";
  if (k[dyEl] === siEl) return "\u904b\u514b\u6c23 \u4e0d\u548c Bu He";
  if (g[dyEl] === siEl) return "\u904b\u751f\u6c23 \u5c0f\u9006 Xiao Ni";
  if (k[siEl] === dyEl) return "\u6c23\u514b\u904b \u5929\u5211 Tian Xing";
  if (g[siEl] === dyEl) return "\u6c23\u751f\u904b \u9806\u5316 Shun Hua";
  return "\u4e0d\u548c Bu He";
}

// Risk assessment (Ke Zhu Jia Lin)
function judgeRisk(keEl, zhuEl) {
  if ((keEl==="\u706b"||keEl==="\u76f8\u706b") && (zhuEl==="\u706b"||zhuEl==="\u76f8\u706b")) return "SF"; // Double Fire
  if (keEl==="\u571f" && zhuEl==="\u571f") return "ST"; // Double Earth
  var k = {"\u6728":"\u571f","\u706b":"\u91d1","\u571f":"\u6c34","\u91d1":"\u6728","\u6c34":"\u706b","\u76f8\u706b":"\u91d1"};
  if (k[keEl]===zhuEl || k[zhuEl]===keEl) return "NI"; // Adverse
  return "OK";
}

// Main calculation
function calcYear(yr) {
  var idx = ((yr - 1984) % 60 + 60) % 60;
  var jz = JIAZI[idx];
  var stem = STEMS[idx % 10];
  var branch = BRANCHES[idx % 12];
  var dyArr = SY[stem];
  var dyName = dyArr[0], dyEl = dyArr[1], taiGuo = dyArr[2];
  var bqArr = BQ[branch];
  var si = bqArr.si, zai = bqArr.zai;
  var siEl = QI_EL[si], zaiEl = QI_EL[zai];
  var keQi = getKeQi(si);
  var kyObj = getKeYun(dyEl, taiGuo);
  var keYunEls = kyObj.els, keYunLabels = kyObj.labels;
  var special = SPECIAL_MAP[jz + yr] || SPECIAL_MAP[jz] || "\u2014 (Ordinary)";
  var rel = yunQiRel(dyEl, siEl);

  var segs = PAIRS.map(function(pair, i) {
    var yi = pair[0], qi = pair[1];
    var zYun = ZHU_YUN[yi];
    var kYun = keYunEls[yi], kYunLbl = keYunLabels[yi];
    var zQi = ZHU_QI[qi];
    var kQi = keQi[qi];
    var zQiEl = QI_EL[zQi] || zQi;
    var kQiEl = QI_EL[kQi] || kQi;
    var risk = judgeRisk(kQiEl, zQiEl);
    var epidemicKey = yr + "-" + i;
    return {
      name: SEG_NAMES[i], zYun: zYun, kYun: kYun, kYunLbl: kYunLbl,
      zQi: zQi, kQi: kQi, zQiEl: zQiEl, kQiEl: kQiEl,
      risk: risk, epidemic: EPIDEMIC[epidemicKey] || null
    };
  });

  return {jz:jz, dyName:dyName, dyEl:dyEl, si:si, zai:zai,
          siEl:siEl, zaiEl:zaiEl, keQi:keQi, special:special, rel:rel, segs:segs};
}

  return e;
}

function append(parent) {
  var args = Array.prototype.slice.call(arguments, 1);
  args.forEach(function(c) { if (c) parent.appendChild(c); });
  return parent;
}

function elemBadge(elemKey, text) {
  var c = ec(elemKey);
  var s = span({background:c.bg, color:c.tx, border:'1px solid '+c.bd,
    borderRadius:'4px', padding:'2px 7px', fontSize:'11px',
    fontWeight:'bold', whiteSpace:'nowrap', display:'inline-block'}, text || elemKey);
  return s;
}

// State
var CUR_YEAR = 2026;
var CUR_HEMI = 'S';

function render() {
  var root = document.getElementById('root');
  root.innerHTML = '';
  var data = calcYear(CUR_YEAR);
  var dates = CUR_HEMI === 'N' ? DATES_N : DATES_S;
  var mob = window.innerWidth <= 600;

  // ── HEADER ────────────────────────────────────────────────
  var hdr = div({background:C.navy, borderRadius:'10px', padding:'14px 16px', marginBottom:'12px'});

  var titleRow = div({display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'12px'});
  var titleLeft = div({});
  append(titleLeft,
    div({color:C.gold, fontSize:'10px', letterSpacing:'2px', marginBottom:'3px'},
        '\u4e94\u904b\u516d\u6c23 \u00b7 WU YUN LIU QI'),
    div({color:'#fff', fontSize: mob?'18px':'22px', fontWeight:'bold', marginBottom:'2px'},
        '\u904b\u6c23 Analyzer'),
    div({color:C.gray, fontSize:'10px'}, 'Sang Hee Park, PhD \u00b7 sangheeparkacupuncture.com')
  );
  titleRow.appendChild(titleLeft);
  hdr.appendChild(titleRow);

  // Year input + controls
  var ctrl = div({display:'flex', gap:'8px', flexWrap:'wrap', alignItems:'center', marginBottom:'12px'});
  var inp = document.createElement('input');
  inp.type = 'number'; inp.value = CUR_YEAR;
  inp.min = '1924'; inp.max = '2103';
  Object.assign(inp.style, {width:'80px', padding:'6px 8px', borderRadius:'6px',
    border:'2px solid '+C.gold, background:C.blue, color:'#fff',
    fontSize:'15px', fontWeight:'bold', textAlign:'center', outline:'none'});
  ctrl.appendChild(inp);

  ['N','S'].forEach(function(h) {
    var btn = el('button', {padding:'6px 13px', borderRadius:'6px', border:'none',
      fontWeight:'bold', fontSize:'12px',
      background: CUR_HEMI===h ? C.gold : C.blue, color:'#fff'});
    btn.textContent = h==='N' ? 'Northern' : 'Southern';
    btn.onclick = function() { CUR_HEMI = h; render(); };
    ctrl.appendChild(btn);
  });

  var analyzeBtn = el('button', {padding:'6px 16px', borderRadius:'6px', border:'none',
    fontWeight:'bold', fontSize:'12px', background:C.red, color:'#fff'}, 'Analyze');
  analyzeBtn.onclick = function() { CUR_YEAR = parseInt(inp.value) || 2026; render(); };
  ctrl.appendChild(analyzeBtn);
  hdr.appendChild(ctrl);

  // Book Now bar
  var bookBar = div({display:'flex', justifyContent:'space-between', alignItems:'center',
    borderTop:'1px solid rgba(255,255,255,0.15)', paddingTop:'10px'});
  bookBar.appendChild(div({color:C.gray, fontSize:'10px'},
    'Free Analyser \u00b7 Su Wen Ch.66-74 \u00b7 Educational purposes only'));
  var bookA = document.createElement('a');
  bookA.href = BOOKING; bookA.target = '_blank';
  Object.assign(bookA.style, {background:C.gold, color:'#fff', borderRadius:'6px',
    padding:'5px 13px', fontSize:'11px', fontWeight:'bold', textDecoration:'none'});
  bookA.textContent = 'Book with Sang Hee';
  bookBar.appendChild(bookA);
  hdr.appendChild(bookBar);
  root.appendChild(hdr);

  // ── ANNUAL SUMMARY ────────────────────────────────────────
  var sumWrap = div({background:C.white, borderRadius:'8px', overflow:'hidden',
    marginBottom:'12px', boxShadow:'0 1px 4px rgba(0,0,0,.08)'});
  var sumHdr = div({background:C.navy, color:'#fff', padding:'9px 14px',
    fontWeight:'bold', fontSize:'13px'},
    CUR_YEAR + ' ' + data.jz + ' \u2014 Annual Summary');
  sumWrap.appendChild(sumHdr);

  var sumGrid = div({display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',
    gap:'8px', padding:'12px'});

  var items = [
    {label:'Da Yun \u5927\u904b', val:data.dyName, el:data.dyEl},
    {label:'Si Tian \u53f8\u5929', val:data.si, sub:QI_EN[data.si]||'', el:data.siEl},
    {label:'Zai Quan \u5728\u6cc9', val:data.zai, sub:QI_EN[data.zai]||'', el:data.zaiEl},
    {label:'Yun-Qi Relation', val:data.rel,
     bg: (data.rel.indexOf('\u4e0d\u548c')>=0||data.rel.indexOf('\u5929\u5211')>=0) ? '#FFF0EE' : '#F0FBF5',
     tc: (data.rel.indexOf('\u4e0d\u548c')>=0||data.rel.indexOf('\u5929\u5211')>=0) ? C.red : C.green},
    {label:'Special Year', val:data.special,
     bg: data.special.indexOf('\u592a\u4e59')>=0 ? '#FFF0EE' :
         data.special.indexOf('\u5929\u7b26')>=0 ? '#FFF5EC' :
         data.special.indexOf('\u6b72\u6703')>=0 ? '#F0FBF5' : '#F5F5F5',
     tc: data.special.indexOf('\u592a\u4e59')>=0 ? C.red :
         data.special.indexOf('\u5929\u7b26')>=0 ? C.orange :
         data.special.indexOf('\u6b72\u6703')>=0 ? C.green : C.navy}
  ];

  items.forEach(function(item) {
    var col = item.el ? ec(item.el) : {bg:item.bg||'#F5F5F5', bd:'#ddd', tx:item.tc||C.navy};
    var card = div({background:col.bg, border:'1px solid '+col.bd, borderRadius:'8px', padding:'9px 11px'});
    append(card,
      div({fontSize:'9px', color:'#888', marginBottom:'3px'}, item.label),
      div({fontWeight:'bold', fontSize:'11px', color:col.tx, lineHeight:'1.4'}, item.val)
    );
    if (item.sub) card.appendChild(div({fontSize:'9px', color:'#777', marginTop:'2px'}, item.sub));
    sumGrid.appendChild(card);
  });
  sumWrap.appendChild(sumGrid);

  // Ke Qi sequence display
  var kqBox = div({margin:'0 12px 12px', padding:'9px 12px', background:C.lgray, borderRadius:'6px'});
  kqBox.appendChild(div({fontSize:'10px', fontWeight:'bold', color:C.ink, marginBottom:'7px'},
    'Ke Qi Sequence \u5ba2\u6c23 \u2014 Si Tian = 3rd position | 2026 verified: ColdWater, WindWood, EmperorFire(ST), DampEarth, MinisterFire, DrynessM'));
  var kqRow = div({display:'flex', gap:'8px', flexWrap:'wrap'});
  data.keQi.forEach(function(q, i) {
    var isST = i===2, isZQ = i===5;
    var colKq = ec(QI_EL[q]||'');
    var item = div({textAlign:'center'});
    item.appendChild(div({fontSize:'9px', color:'#888', marginBottom:'3px'},
      (i+1)+'\u6c23'+(isST?' \u2605ST':isZQ?' ZQ':'')));
    var badge = span({background:colKq.bg, color:colKq.tx,
      border:(isST?'2px solid '+C.gold:isZQ?'2px solid '+C.navy:'1px solid '+colKq.bd),
      borderRadius:'4px', padding:'2px 7px', fontSize:'10px',
      fontWeight:'bold', display:'inline-block'}, q.slice(2)||q);
    item.appendChild(badge);
    kqRow.appendChild(item);
  });
  kqBox.appendChild(kqRow);
  sumWrap.appendChild(kqBox);
  root.appendChild(sumWrap);

  // ── TEN SEGMENTS TABLE ────────────────────────────────────
  var tblWrap = div({background:C.white, borderRadius:'8px', overflow:'hidden',
    marginBottom:'12px', boxShadow:'0 1px 4px rgba(0,0,0,.08)'});

  var tblHdr = div({background:C.navy, color:'#fff', padding:'9px 14px',
    fontWeight:'bold', fontSize:'13px'},
    '\u5341\u7bc0\u6bb5 Ten Segments \u00b7 '+(CUR_HEMI==='S'?'Southern':'Northern')+' Hemisphere');
  tblWrap.appendChild(tblHdr);

  var disclaimer = div({background:'#FFFBE8', borderLeft:'4px solid '+C.dkGold,
    padding:'9px 14px', fontSize:'10px', color:'#5A4A00', lineHeight:'1.6'},
    'Acupuncture Points and Herbal Formulas shown are general climate-based recommendations from Su Wen Ch.66-74 only. They are NOT personalised to any individual. If you have existing health conditions, please consult a qualified TCM practitioner.');
  tblWrap.appendChild(disclaimer);

  var tblOuter = div({overflowX:'auto'});
  var tbl = document.createElement('table');

  var thead = document.createElement('thead');
  var hrow = document.createElement('tr');
  ['Segment','Date','Zhu Yun','Ke Yun','Zhu Qi','Ke Qi','Risk','Climate','Disease','Acu Points','Herbs'].forEach(function(t) {
    var th = document.createElement('th');
    th.textContent = t;
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  tbl.appendChild(thead);

  var tbody = document.createElement('tbody');
  data.segs.forEach(function(s, i) {
    var ri = RISK_INFO[s.risk];
    var cl = CL[s.risk];
    var epiKey = CUR_YEAR + '-' + i;
    var epidemic = EPIDEMIC[epiKey] || null;

    var tr = document.createElement('tr');
    tr.style.background = i%2===0 ? '#FAFAFA' : '#FFF';
    tr.style.borderLeft = '3px solid ' + ri.bd;
    if (epidemic) tr.style.background = '#FFF8F5';

    // Segment name
    var tdName = document.createElement('td');
    tdName.style.fontWeight = 'bold';
    tdName.style.color = ri.color;
    tdName.style.whiteSpace = 'nowrap';
    tdName.textContent = s.name;
    if (epidemic) {
      var epB = div({background:C.red, color:'#fff', fontSize:'8px', fontWeight:'bold',
        padding:'1px 5px', borderRadius:'3px', marginTop:'3px', whiteSpace:'nowrap'}, 'EPIDEMIC');
      tdName.appendChild(epB);
    }
    tr.appendChild(tdName);

    // Date
    var tdDate = document.createElement('td');
    tdDate.style.whiteSpace = 'nowrap';
    tdDate.style.color = '#555';
    tdDate.textContent = dates[i];
    tr.appendChild(tdDate);

    // Zhu Yun
    var tdZY = document.createElement('td');
    tdZY.appendChild(elemBadge(s.zYun, s.zYun));
    tr.appendChild(tdZY);

    // Ke Yun
    var tdKY = document.createElement('td');
    tdKY.appendChild(elemBadge(s.kYun, s.kYun));
    var kyL = div({fontSize:'9px', color:'#888', marginTop:'2px'}, s.kYunLbl);
    tdKY.appendChild(kyL);
    tr.appendChild(tdKY);

    // Zhu Qi (Host Qi)
    var tdZQ = document.createElement('td');
    var zqEl = QI_EL[s.zQi] || '';
    var zqC = ec(zqEl);
    tdZQ.appendChild(div({color:zqC.tx, fontSize:'10px', whiteSpace:'nowrap'}, s.zQi));
    tdZQ.appendChild(div({color:'#999', fontSize:'9px'}, QI_EN[s.zQi]||''));
    tr.appendChild(tdZQ);

    // Ke Qi (Guest Qi)
    var tdKQ = document.createElement('td');
    var kqEl = QI_EL[s.kQi] || '';
    var kqC = ec(kqEl);
    tdKQ.appendChild(div({color:kqC.tx, fontSize:'10px', fontWeight:'bold', whiteSpace:'nowrap'}, s.kQi));
    tdKQ.appendChild(div({color:'#999', fontSize:'9px'}, QI_EN[s.kQi]||''));
    tr.appendChild(tdKQ);

    // Risk badge
    var tdRisk = document.createElement('td');
    var rb = span({background:ri.bg, color:ri.color, border:'1px solid '+ri.bd,
      borderRadius:'4px', padding:'2px 6px', fontSize:'9px', fontWeight:'bold',
      display:'block', whiteSpace:'nowrap'}, ri.label);
    tdRisk.appendChild(rb);
    tr.appendChild(tdRisk);

    // Climate
    var tdCl = document.createElement('td');
    tdCl.style.minWidth = '120px';
    tdCl.style.fontSize = '10px';
    tdCl.style.color = '#444';
    tdCl.style.lineHeight = '1.5';
    tdCl.textContent = cl.climate;
    tr.appendChild(tdCl);

    // Disease + epidemic warning
    var tdDis = document.createElement('td');
    tdDis.style.minWidth = '140px';
    tdDis.style.fontSize = '10px';
    tdDis.style.lineHeight = '1.5';
    tdDis.appendChild(div({color:'#444'}, cl.disease));
    if (epidemic) {
      var epDiv = div({background:'#FFF0EE', border:'1px solid '+C.red,
        borderRadius:'4px', padding:'4px 6px', fontSize:'9px', color:C.red,
        lineHeight:'1.4', marginTop:'4px'}, epidemic);
      tdDis.appendChild(epDiv);
    }
    tr.appendChild(tdDis);

    // Acu points
    var tdAcu = document.createElement('td');
    tdAcu.style.minWidth = '130px';
    tdAcu.style.fontSize = '10px';
    tdAcu.style.color = C.ink;
    tdAcu.style.lineHeight = '1.6';
    tdAcu.textContent = cl.acu;
    tr.appendChild(tdAcu);

    // Herbs
    var tdHerb = document.createElement('td');
    tdHerb.style.minWidth = '150px';
    tdHerb.style.fontSize = '10px';
    tdHerb.style.color = '#2D5A3D';
    tdHerb.style.lineHeight = '1.5';
    tdHerb.textContent = cl.herbs;
    tr.appendChild(tdHerb);

    tbody.appendChild(tr);
  });

  tbl.appendChild(tbody);
  tblOuter.appendChild(tbl);
  tblWrap.appendChild(tblOuter);
  root.appendChild(tblWrap);

  // ── FOOTER ───────────────────────────────────────────────
  var footer = div({textAlign:'center', padding:'14px 0 20px', color:'#999', fontSize:'10px', lineHeight:'1.8'});
  footer.innerHTML = 'Educational purposes only \u00b7 Not a substitute for clinical judgement \u00b7 \u00a9 Blossom Skin & Health Pty Ltd<br/>Source: Su Wen Ch.66-74 \u00b7 Sang Hee Park PhD course materials';
  root.appendChild(footer);
}

// Initial render
render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js').catch(function(){});
  });
}
</script>
</body>
</html>
