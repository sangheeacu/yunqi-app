  const seq=[dyEl];
  let cur=dyEl,isTai=taiGuo;
  for(let i=1;i<5;i++){cur=YG[cur];isTai=!isTai;seq.push(cur);}

}
function getKeYunLabel(dyEl,taiGuo){
  const seq=[];
  let cur=dyEl,isTai=taiGuo;
  const ch={"\u6728":"\u89d2","\u706b":"\u5fb5","\u571f":"\u5bae","\u91d1":"\u5546","\u6c34":"\u7fbd"};

    seq.push((isTai?"\u592a":"\u5c11")+ch[cur]);
    cur=YG[cur];isTai=!isTai;
  }

}

// Yun-Qi relationship
function yunQiRel(dyEl,siEl){
  const k={"\u6728":"\u571f","\u706b":"\u91d1","\u571f":"\u6c34","\u91d1":"\u6728","\u6c34":"\u706b","\u76f8\u706b":"\u91d1"};
  const g={"\u6728":"\u706b","\u706b":"\u571f","\u571f":"\u91d1","\u91d1":"\u6c34","\u6c34":"\u6728","\u76f8\u706b":"\u571f"};
  if(dyEl===siEl)return"\u5929\u7b26 (Tian Fu \u5929\u7b26)";
  if(k[dyEl]===siEl)return"\u904b\u514b\u6c23 \u4e0d\u548c (Bu He)";
  if(g[dyEl]===siEl)return"\u904b\u751f\u6c23 \u5c0f\u9006 (Xiao Ni)";
  if(k[siEl]===dyEl)return"\u6c23\u514b\u904b \u5929\u5211 (Tian Xing)";
  if(g[siEl]===dyEl)return"\u6c23\u751f\u904b \u9806\u5316 (Shun Hua)";
  return"\u4e0d\u548c (Bu He)";
}

// Ke Zhu Jia Lin risk assessment

  if((keQiEl==="\u706b"||keQiEl==="\u76f8\u706b")&&(zhuQiEl==="\u706b"||zhuQiEl==="\u76f8\u706b"))return"\u96d9\u706b";
  if(keQiEl==="\u571f"&&zhuQiEl==="\u571f")return"\u96d9\u571f";
  const k={"\u6728":"\u571f","\u706b":"\u91d1","\u571f":"\u6c34","\u91d1":"\u6728","\u6c34":"\u706b","\u76f8\u706b":"\u91d1"};
  if(k[keQiEl]===zhuQiEl)return"\u9006";
  if(k[zhuQiEl]===keQiEl)return"\u9006";
  return"\u9806";
}

// ── Main calculation ──────────────────────────────────────────
function calcYear(yr){
  const idx=((yr-1984)%60+60)%60;
  const jz=JIAZI[idx],stem=STEMS[idx%10],branch=BRANCHES[idx%12];
  const[dyName,dyEl,taiGuo]=SY[stem];
  const{si,zai}=BQ[branch];
  const siEl=SQ_EL[si],zaiEl=SQ_EL[zai];
  const keQi=getKeQi(si);
  const keYun=getKeYun(dyEl,taiGuo);
  const keYunLbl=getKeYunLabel(dyEl,taiGuo);
  const special=SPECIAL_MAP[jz+yr]||SPECIAL_MAP[jz]||"\u2014 (Ordinary \u5e73\u5e74)";
  const rel=yunQiRel(dyEl,siEl);

  const segs=PAIRS.map(([yi,qi],i)=>{
    const zYun=FY[yi],kYun=keYun[yi],kYunLbl=keYunLbl[yi];
    const zQi=SQ[qi],kQi=keQi[qi];
    const zQiEl=SQ_EL[zQi],kQiEl=SQ_EL[kQi];
    const risk=judgeRisk(kQiEl,zQiEl);
    const epidemicKey=yr+"-"+i;
    const epidemic=EPIDEMIC_WARN[epidemicKey]||null;
    return{name:SEG_NAMES[i],zYun,kYun,kYunLbl,zQi,kQi,zQiEl,kQiEl,risk,epidemic};
  });

  return{jz,stem,branch,dyName,dyEl,taiGuo,si,zai,siEl,zaiEl,keQi,keYun,keYunLbl,special,rel,segs};
}

// ── Render ────────────────────────────────────────────────────
function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k==="onclick")el.onclick=v;
    else el.setAttribute(k,v);
  });
  if(children){
    if(Array.isArray(children))children.forEach(c=>{if(c)el.appendChild(typeof c==="string"?document.createTextNode(c):c);});
    else if(typeof children==="string")el.textContent=children;
    else el.appendChild(children);
  }
  return el;
}
function txt(s){return document.createTextNode(s);}
function div(style,children){return h("div",{style},children);}
function span(style,text){return h("span",{style},text);}
function badge(el,label){
  const col=ec(el);
  return h("span",{style:{background:col.bg,color:col.tx,border:"1px solid "+col.bd,borderRadius:4,padding:"2px 6px",fontSize:10,fontWeight:"bold",whiteSpace:"nowrap"}},label);
}

let currentYear=2026,currentHemi="S",currentData=calcYear(2026);
const BOOKING="https://blossom-skin-and-health-acupuncture-clinic.au2.cliniko.com/bookings";
const mob=window.innerWidth<=600;

function render(){
  currentData=calcYear(currentYear);
  const root=document.getElementById("root");
  root.innerHTML="";

  // ── HEADER ───────────────────────────────────────────────
  const hdr=div({background:C.navy,borderRadius:10,padding:"12px 16px",marginBottom:12});
  hdr.appendChild(div({color:C.gold,fontSize:10,letterSpacing:2,marginBottom:2},"\u4e94\u904b\u516d\u6c23 \u00b7 WU YUN LIU QI"));
  hdr.appendChild(div({color:"#fff",fontSize:mob?17:22,fontWeight:"bold",marginBottom:2},"\u904b\u6c23 Analyzer"));
  hdr.appendChild(div({color:C.gray,fontSize:10,marginBottom:12},"Sang Hee Park, PhD \u00b7 AHPRA Registered Acupuncturist \u00b7 sangheeparkacupuncture.com"));

  // Controls
  const ctrl=div({display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:12});
  const inp=h("input",{type:"number",min:"1924",max:"2103",value:currentYear,style:{width:80,padding:"6px 8px",borderRadius:6,border:"2px solid "+C.gold,background:C.blue,color:"#fff",fontSize:15,fontWeight:"bold",textAlign:"center",outline:"none"}});
  ctrl.appendChild(inp);
  ["N","S"].forEach(hm=>{
    const btn=h("button",{style:{padding:"6px 14px",borderRadius:6,border:"none",cursor:"pointer",fontWeight:"bold",fontSize:12,background:currentHemi===hm?C.gold:C.blue,color:"#fff"}},hm==="N"?"\uD83C\uDF0F Northern":"\uD83C\uDF0F Southern");
    btn.onclick=()=>{currentHemi=hm;render();};
    ctrl.appendChild(btn);
  });
  const analyzeBtn=h("button",{style:{padding:"6px 16px",borderRadius:6,border:"none",cursor:"pointer",fontWeight:"bold",fontSize:12,background:C.red,color:"#fff"}},"Analyze");
  analyzeBtn.onclick=()=>{currentYear=parseInt(inp.value)||2026;render();};
  ctrl.appendChild(analyzeBtn);
  hdr.appendChild(ctrl);

  // Book Now
  const bookBar=div({display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:"1px solid rgba(255,255,255,0.15)",paddingTop:10});
  bookBar.appendChild(div({color:C.gray,fontSize:10},"Free Analyser \u00b7 Educational purposes only \u00b7 Su Wen Ch.66\u201374"));

  bookBar.appendChild(bookBtn);
  hdr.appendChild(bookBar);
  root.appendChild(hdr);

  const d=currentData;

  // ── ANNUAL SUMMARY ───────────────────────────────────────

  const sumTitle=div({background:C.navy,color:"#fff",borderRadius:"6px 6px 0 0",padding:"8px 14px",fontWeight:"bold",fontSize:13,marginBottom:10});
  sumTitle.textContent=currentYear+"\u5e74 "+d.jz+" \u2014 Annual Yun Qi Summary";
  sumCard.insertBefore(sumTitle,sumCard.firstChild);

  const grid=div({display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8});
  const items=[

    {label:"Si Tian \u53f8\u5929",val:d.si,sub:SQ_EN[d.si],el:d.siEl},
    {label:"Zai Quan \u5728\u6cc9",val:d.zai,sub:SQ_EN[d.zai],el:d.zaiEl},

    {label:"Special Year",val:d.special,bg:d.special.includes("\u592a\u4e59")?"#FFF0EE":d.special.includes("\u5929\u7b26")||d.special.includes("\u540c\u5929")?"#FFF5EC":d.special.includes("\u6b72\u6703")||d.special.includes("\u540c\u6b72")?"#F0FBF5":"#F5F5F5",tc:d.special.includes("\u592a\u4e59")?C.red:d.special.includes("\u5929\u7b26")||d.special.includes("\u540c\u5929")?C.orange:d.special.includes("\u6b72\u6703")||d.special.includes("\u540c\u6b72")?C.green:C.navy},
  ];
  items.forEach(item=>{
    const col=item.el?ec(item.el):{bg:item.bg||"#F5F5F5",bd:"#ddd",tx:item.tc||C.navy};
    const card=div({background:col.bg,border:"1px solid "+col.bd,borderRadius:8,padding:"9px 11px"});
    card.appendChild(div({fontSize:9,color:"#888",marginBottom:3},item.label));
    card.appendChild(div({fontWeight:"bold",fontSize:11,color:col.tx,lineHeight:1.4},item.val));
    if(item.sub)card.appendChild(div({fontSize:9,color:"#777",marginTop:2},item.sub));
    grid.appendChild(card);

  sumCard.appendChild(grid);

  // Ke Qi sequence display
  const kqRow=div({marginTop:10,padding:"8px 10px",background:C.lgray,borderRadius:6});
  kqRow.appendChild(div({fontSize:10,fontWeight:"bold",color:C.ink,marginBottom:6},"\u5ba2\u6c23 Ke Qi Sequence — Si Tian (\u53f8\u5929) = 3rd Position (Su Wen 71 \u516d\u5143\u6b63\u7d00\u5927\u8ad6)"));
  const kqFlex=div({display:"flex",gap:6,flexWrap:"wrap"});
  d.keQi.forEach((q,i)=>{
    const isST=i===2,isZQ=i===5;
    const col=ec(SQ_EL[q]);
    const item=div({textAlign:"center"});
    item.appendChild(div({fontSize:9,color:"#888",marginBottom:2},(i+1)+"\u6c23"+(isST?" \u2605ST":isZQ?" \u25cb ZQ":"")));
    item.appendChild(h("span",{style:{background:col.bg,color:col.tx,border:(isST?"2px solid "+C.gold:isZQ?"2px solid "+C.navy:"1px solid "+col.bd),borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:"bold",display:"inline-block"}},q.slice(2)));
    kqFlex.appendChild(item);
  });
  kqRow.appendChild(kqFlex);
  sumCard.appendChild(kqRow);
  root.appendChild(sumCard);

  // ── 10-SEGMENT TABLE ──────────────────────────────────────
  const segCard=div({background:C.white,borderRadius:8,overflow:"hidden",marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,.08)"});

  // Disclaimer
  const disc=div({background:"#FFFBE8",borderLeft:"4px solid "+C.dkGold,padding:"9px 14px",fontSize:10,color:"#5A4A00",lineHeight:1.6});
  disc.innerHTML="<strong>Note:</strong> Acupuncture points and herbal formulas shown are general climate-based recommendations from Su Wen Ch.66\u201374. They apply to the general population under these climate conditions and are <strong>NOT personalised</strong> to any individual's constitution or health conditions. If you have existing health conditions, consult a qualified TCM practitioner.";
  segCard.appendChild(disc);

  const tblWrap=div({overflowX:"auto"});
  const tbl=h("table");
  const thead=h("thead");
  const hrow=h("tr");
  ["Segment","Date ("+currentHemi+")","Zhu Yun \u4e3b\u904b","Ke Yun \u5ba2\u904b","Zhu Qi \u4e3b\u6c23","Ke Qi \u5ba2\u6c23","Risk","Climate","Disease","Acu Points \u9462\u4f4d","Herbs \u65b9\u5291"].forEach(t=>{
    hrow.appendChild(h("th",null,t));
  });
  thead.appendChild(hrow);
  tbl.appendChild(thead);

  const tbody=h("tbody");
  const dates=currentHemi==="N"?DATES_N:DATES_S;

  d.segs.forEach((s,i)=>{
    const cl=SEG_CLINICAL[s.risk];
    const epidemicKey=currentYear+"-"+i;
    const epidemic=EPIDEMIC_WARN[epidemicKey];
    const tr=h("tr");
    tr.style.background=i%2===0?"#FAFAFA":"#FFF";
    tr.style.borderLeft="3px solid "+cl.color;
    if(epidemic)tr.style.background=cl.bg;

    // Segment name
    const nameTd=h("td");
    nameTd.appendChild(div({fontWeight:"bold",color:cl.color,fontSize:11,whiteSpace:"nowrap"},SEG_NAMES[i]));
    if(epidemic){
      const epBadge=div({background:C.red,color:"#fff",fontSize:9,fontWeight:"bold",padding:"1px 5px",borderRadius:3,marginTop:3,whiteSpace:"nowrap"},"\u26a0\uFE0F EPIDEMIC");
      nameTd.appendChild(epBadge);
    }
    tr.appendChild(nameTd);

    // Date
    const dateTd=h("td");
    dateTd.appendChild(div({fontSize:10,color:"#555",whiteSpace:"nowrap"},dates[i]));
    tr.appendChild(dateTd);

    // Zhu Yun
    const zyTd=h("td");
    zyTd.appendChild(badge(s.zYun,s.zYun));
    tr.appendChild(zyTd);

    // Ke Yun
    const kyTd=h("td");
    const kyCol=ec(s.kYun);
    kyTd.appendChild(div({display:"inline-block"},badge(s.kYun,s.kYun)));
    kyTd.appendChild(div({fontSize:9,color:"#888",marginTop:2},s.kYunLbl));
    tr.appendChild(kyTd);

    // Zhu Qi
    const zqTd=h("td");
    zqTd.appendChild(div({fontSize:10,color:ec(s.zQiEl).tx,whiteSpace:"nowrap"},s.zQi));
    zqTd.appendChild(div({fontSize:9,color:"#999"},SQ_EN[s.zQi]));
    tr.appendChild(zqTd);

    // Ke Qi
    const kqTd=h("td");
    kqTd.appendChild(div({fontSize:10,color:ec(s.kQiEl).tx,fontWeight:"bold",whiteSpace:"nowrap"},s.kQi));
    kqTd.appendChild(div({fontSize:9,color:"#999"},SQ_EN[s.kQi]));
    tr.appendChild(kqTd);

    // Risk badge
    const riskTd=h("td");
    const rb=h("span",{style:{background:cl.bg,color:cl.color,border:"1px solid "+cl.color,borderRadius:4,padding:"2px 6px",fontSize:9,fontWeight:"bold",display:"block",whiteSpace:"nowrap"}},cl.label);
    riskTd.appendChild(rb);
    tr.appendChild(riskTd);

    // Climate
    const ctTd=h("td",{style:{minWidth:120,fontSize:9,color:"#444",lineHeight:1.5}},cl.climate);
    tr.appendChild(ctTd);

    // Disease + epidemic warning
    const disTd=h("td",{style:{minWidth:140,fontSize:9}});
    disTd.appendChild(div({color:"#444",lineHeight:1.5,marginBottom:epidemic?4:0},cl.disease));

      disTd.appendChild(epDiv);
    }
    tr.appendChild(disTd);

    // Acu points
    const acuTd=h("td",{style:{minWidth:130,fontSize:9,color:C.ink,lineHeight:1.6,fontFamily:"monospace"}},cl.acu);
    tr.appendChild(acuTd);

    // Herbs
    const herbTd=h("td",{style:{minWidth:150,fontSize:9,color:"#2D5A3D",lineHeight:1.5}},cl.herbs);
    tr.appendChild(herbTd);

    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  tblWrap.appendChild(tbl);
  segCard.appendChild(tblWrap);
  root.appendChild(segCard);

  // ── HIGH RISK SUMMARY ─────────────────────────────────────
  const highRisk=d.segs.filter(s=>s.risk==="\u96d9\u706b"||s.risk==="\u96d9\u571f"||s.risk==="\u9006");
  if(highRisk.length>0){
    const hrCard=div({background:C.white,borderRadius:8,overflow:"hidden",marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,.08)"});
    const hrHdr=div({background:C.red,color:"#fff",padding:"9px 14px",fontWeight:"bold",fontSize:13});
    hrHdr.textContent="\u26a0\uFE0F High-Risk Periods — "+currentYear+" ("+highRisk.length+" segments)";
    hrCard.appendChild(hrHdr);

    const hrGrid=div({display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:8,padding:12});
    d.segs.forEach((s,i)=>{
      if(s.risk==="\u9806")return;
      const cl=SEG_CLINICAL[s.risk];
      const epidemic=EPIDEMIC_WARN[currentYear+"-"+i];
      const card=div({background:cl.bg,border:"1px solid "+cl.color,borderRadius:8,padding:12});
      card.appendChild(div({fontWeight:"bold",color:cl.color,fontSize:12,marginBottom:3},SEG_NAMES[i]+" \u00b7 "+dates[i]));
      card.appendChild(div({fontSize:11,color:cl.color,marginBottom:5},cl.label));
      card.appendChild(div({fontSize:10,color:"#555",marginBottom:4},"Prepare: "+SEG_CLINICAL[s.risk].prep));
      if(epidemic){
        card.appendChild(div({fontSize:10,color:C.red,fontWeight:"bold",padding:"4px 6px",background:"#FFF",borderRadius:4,border:"1px solid "+C.red},epidemic));
      }
      hrGrid.appendChild(card);
    });
    hrCard.appendChild(hrGrid);
    root.appendChild(hrCard);
  }

  // ── SPECIAL YEAR INFO ─────────────────────────────────────
  const spInfo={
    "\u592a\u4e59\u5929\u7b26":{desc:"MAXIMUM severity. Da Yun = Si Tian = Earthly Branch (triple alignment). Strikes like an arrow — deepest penetration, slowest recovery. Maximum clinical vigilance.",color:C.red},
    "\u5929\u7b26":{desc:"HIGH severity. Da Yun element = Si Tian element. Sudden onset, difficult to treat.",color:C.orange},
    "\u540c\u5929\u7b26":{desc:"ELEVATED severity. Yang Da Yun = Zai Quan element. Sustained intensity, Yang-type excess.",color:C.orange},
    "\u6b72\u6703":{desc:"ORDERLY. Da Yun = Earthly Branch position. Persistent but stable, easier to manage.",color:C.green},
    "\u540c\u6b72\u6703":{desc:"MODERATE. Yin Da Yun = Zai Quan element. Sustained, slow building, chronic conditions.",color:C.dkGold}

  const matchedSp=Object.keys(spInfo).find(k=>d.special.includes(k));

    spCard.appendChild(div({fontSize:12,lineHeight:1.6,opacity:0.95},spInfo[matchedSp].desc));
    root.appendChild(spCard);
  }

  // ── FOOTER ───────────────────────────────────────────────
  const footer=div({textAlign:"center",padding:"14px 0",color:"#999",fontSize:10,lineHeight:1.8});

  root.appendChild(footer);
}

// Initial render
render();

  window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}));
}
